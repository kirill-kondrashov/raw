name: Execute notebooks

on:
  push:
    branches:
      - main
    paths:
      - 'notebooks/**'
      - '.github/workflows/execute-notebooks.yml'
  pull_request:
    paths:
      - 'notebooks/**'
      - '.github/workflows/execute-notebooks.yml'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  execute-notebooks:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Set up uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Create notebook environment
        run: |
          uv venv .venv
          uv pip install --python .venv/bin/python jupyter nbconvert nbclient numpy scipy matplotlib

      - name: Execute notebooks
        run: |
          . .venv/bin/activate
          mkdir -p executed-notebooks
          for notebook in notebooks/*.ipynb; do
            base="$(basename "$notebook" .ipynb)"
            jupyter nbconvert \
              --to notebook \
              --execute "$notebook" \
              --output "${base}.executed.ipynb" \
              --output-dir executed-notebooks \
              --ExecutePreprocessor.timeout=900
          done

      - name: Upload executed notebook
        uses: actions/upload-artifact@v4
        with:
          name: executed-notebooks
          path: executed-notebooks/*.ipynb
